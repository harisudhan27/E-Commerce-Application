<!DOCTYPE html>
<html>
<head>

<title>E-Commerce Store</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}


header{
    background:#222;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
}


button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
    border-radius:5px;
}


.container{
    padding:20px;
}


.products{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}


.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;

}


.card img{

width:100%;
height:180px;
object-fit:cover;

}


.cart{

background:white;
padding:20px;
margin-top:30px;

}


input{

padding:10px;
margin:5px;

}


</style>

</head>


<body>


<header>

<h2>My E-Commerce</h2>

<div>

<button onclick="showLogin()">
Login
</button>

<button onclick="showCart()">
Cart
</button>

</div>


</header>




<div class="container">


<h2>Products</h2>


<div class="products" id="products">


</div>




<div class="cart" id="cart">


<h2>Shopping Cart</h2>

<div id="cartItems">

Cart is empty

</div>


<h3 id="total">
Total : ₹0
</h3>


<button onclick="checkout()">
Checkout
</button>


</div>



</div>





<script>


let products=[


{
id:1,
name:"Laptop",
price:50000,
image:"images/laptop.jpg",
description:"Gaming Laptop"
},


{
id:2,
name:"Mobile",
price:20000,
image:"images/mobile.jpg",
description:"Android Phone"
},


{
id:3,
name:"Headphone",
price:3000,
image:"images/headphone.jpg",
description:"Wireless Headphone"
}

];



let cart=[];



function displayProducts(){


let box=document.getElementById("products");


box.innerHTML="";


products.forEach(p=>{


box.innerHTML+=`


<div class="card">


<img src="${p.image}">


<h3>${p.name}</h3>


<p>${p.description}</p>


<h3>₹${p.price}</h3>


<button onclick="addCart(${p.id})">

Add To Cart

</button>


</div>


`;


});


}



function addCart(id){


let product=
products.find(p=>p.id==id);


cart.push(product);


displayCart();


alert("Added to cart");


}




function displayCart(){


let area=
document.getElementById("cartItems");


area.innerHTML="";


let total=0;



if(cart.length==0)
{

area.innerHTML="Cart is empty";

}



cart.forEach((item,index)=>{


total+=item.price;


area.innerHTML+=`

<p>

${item.name}

₹${item.price}


<button onclick="removeItem(${index})">
X
</button>

</p>

`;


});



document.getElementById("total")
.innerHTML="Total : ₹"+total;



}




function removeItem(i){


cart.splice(i,1);

displayCart();


}





function checkout(){


if(cart.length==0)
{

alert("Cart empty");

return;

}


alert(
"Order placed successfully!"
);


cart=[];

displayCart();


}






function showLogin(){


let name=prompt(
"Enter username"
);


if(name)
{

alert(
"Welcome "+name
);

}


}




function showCart(){


window.scrollTo(
{
top:500,
behavior:"smooth"
}
);


}




displayProducts();


</script>



</body>
</html>
